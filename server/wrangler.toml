name = "toilet-pi"
main = "src/cloudflare/entry.ts"
compatibility_date = "2026-04-07"
preview_urls = false

[assets]
directory = "./public"

[durable_objects]
bindings = [
  { name = "TOILET_PI_HUB", class_name = "ToiletPiHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ToiletPiHub"]

[vars]
# TOILET_PI_SERVER_TOKEN: set via `wrangler secret put`
